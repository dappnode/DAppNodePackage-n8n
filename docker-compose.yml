version: "3.5"
services:
  n8n:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UPSTREAM_VERSION: n8n@2.5.1
    image: n8n.dnp.dappnode.eth:0.1.0
    restart: unless-stopped
    environment:
      N8N_HOST: n8n.dappnode
      N8N_PORT: "5678"
      N8N_PROTOCOL: https
      N8N_EDITOR_BASE_URL: https://n8n.dappnode:5678/
      WEBHOOK_URL: https://n8n.dappnode:5678/
      N8N_SECURE_COOKIE: "false"
      NODE_ENV: production
    volumes:
      - n8n-data:/home/node/.n8n
volumes:
  n8n-data: {}
